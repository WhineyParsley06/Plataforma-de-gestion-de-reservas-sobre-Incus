---
- name: Desplegar app-api con interfaz web
  hosts: api
  become: true

  vars:
    app_dir: /opt/reservas/app-api
    core_url: "http://10.10.0.11:8001"

  tasks:
    - name: Instalar dependencias del sistema
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - curl
        state: present
        update_cache: yes

    - name: Crear carpeta de app-api
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Crear entorno virtual
      command: python3 -m venv {{ app_dir }}/venv
      args:
        creates: "{{ app_dir }}/venv"

    - name: Instalar librerias Python
      pip:
        virtualenv: "{{ app_dir }}/venv"
        name:
          - fastapi
          - uvicorn
          - requests

    - name: Crear aplicacion app-api con interfaz
      copy:
        dest: "{{ app_dir }}/main.py"
        content: |
          from fastapi import FastAPI, HTTPException
          from fastapi.responses import HTMLResponse
          from pydantic import BaseModel
          import requests
          import os

          app = FastAPI(title="app-api - Plataforma de Reservas")

          CORE_URL = os.getenv("CORE_URL", "http://10.10.0.11:8001")

          class ReservaRequest(BaseModel):
              nombre: str
              email: str
              recurso_id: int
              fecha_reserva: str

          @app.get("/health")
          def health():
              return {
                  "service": "app-api",
                  "status": "ok",
                  "core_url": CORE_URL
              }

          @app.get("/api/recursos")
          def api_recursos():
              try:
                  r = requests.get(f"{CORE_URL}/recursos", timeout=5)
                  return r.json()
              except Exception as e:
                  raise HTTPException(status_code=500, detail=str(e))

          @app.get("/api/reservas")
          def api_reservas():
              try:
                  r = requests.get(f"{CORE_URL}/reservas", timeout=5)
                  return r.json()
              except Exception as e:
                  raise HTTPException(status_code=500, detail=str(e))

          @app.post("/api/reservas")
          def api_crear_reserva(data: ReservaRequest):
              try:
                  r = requests.post(
                      f"{CORE_URL}/reservas",
                      json=data.dict(),
                      timeout=5
                  )
                  return r.json()
              except Exception as e:
                  raise HTTPException(status_code=500, detail=str(e))

          @app.get("/", response_class=HTMLResponse)
          def index():
              return """
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Reservas Académicas</title>
            <style>
              * {
                box-sizing: border-box;
              }

              body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #eef2f7;
                color: #1f2937;
              }

              header {
                background: linear-gradient(135deg, #2563eb, #1e40af);
                color: white;
                padding: 35px 20px;
                text-align: center;
              }

              header h1 {
                margin: 0;
                font-size: 32px;
              }

              header p {
                margin-top: 10px;
                font-size: 16px;
                opacity: 0.95;
              }

              main {
                max-width: 1100px;
                margin: 30px auto;
                padding: 0 20px;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 24px;
              }

              .card {
                background: white;
                border-radius: 18px;
                padding: 24px;
                box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
              }

              .card h2 {
                margin-top: 0;
                color: #1d4ed8;
              }

              label {
                display: block;
                margin-top: 14px;
                font-weight: bold;
                font-size: 14px;
              }

              input, select {
                width: 100%;
                margin-top: 6px;
                padding: 11px;
                border: 1px solid #cbd5e1;
                border-radius: 10px;
                font-size: 15px;
              }

              button {
                margin-top: 18px;
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 10px;
                background: #2563eb;
                color: white;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
              }

              button:hover {
                background: #1d4ed8;
              }

              .item {
                border: 1px solid #e5e7eb;
                border-radius: 12px;
                padding: 14px;
                margin-bottom: 12px;
                background: #f8fafc;
              }

              .item strong {
                color: #111827;
              }

              .badge {
                display: inline-block;
                padding: 4px 8px;
                border-radius: 999px;
                background: #dcfce7;
                color: #166534;
                font-size: 12px;
                margin-top: 6px;
              }

              .msg {
                margin-top: 14px;
                padding: 12px;
                border-radius: 10px;
                display: none;
              }

              .ok {
                background: #dcfce7;
                color: #166534;
              }

              .error {
                background: #fee2e2;
                color: #991b1b;
              }

              footer {
                text-align: center;
                padding: 20px;
                color: #64748b;
                font-size: 14px;
              }

              @media (max-width: 800px) {
                main {
                  grid-template-columns: 1fr;
                }
              }
            </style>
          </head>
          <body>
            <header>
              <h1>Plataforma de Gestión de Reservas</h1>
              <p>Laboratorios académicos sobre Incus · app-api · app-core · PostgreSQL</p>
            </header>

            <main>
              <section class="card">
                <h2>Recursos disponibles</h2>
                <div id="recursos">Cargando recursos...</div>
              </section>

              <section class="card">
                <h2>Crear reserva</h2>

                <label>Nombre</label>
                <input id="nombre" placeholder="Ej: David Valderrama">

                <label>Correo</label>
                <input id="email" placeholder="Ej: deivid870@hotmail.com">

                <label>Recurso</label>
                <select id="recurso_id"></select>

                <label>Fecha y hora</label>
                <input id="fecha" type="datetime-local">

                <button onclick="crearReserva()">Reservar</button>

                <div id="mensaje" class="msg"></div>
              </section>

              <section class="card" style="grid-column: 1 / -1;">
                <h2>Reservas registradas</h2>
                <div id="reservas">Cargando reservas...</div>
              </section>
            </main>

            <footer>
              Proyecto final de Sistemas Distribuidos · Infraestructura con Incus, Ansible y OpenTofu
            </footer>

            <script>
              async function cargarRecursos() {
                const contenedor = document.getElementById("recursos");
                const select = document.getElementById("recurso_id");

                try {
                  const res = await fetch("/api/recursos");
                  const data = await res.json();

                  contenedor.innerHTML = "";
                  select.innerHTML = "";

                  data.forEach(r => {
                    contenedor.innerHTML += `
                      <div class="item">
                        <strong>${r.nombre}</strong><br>
                        Tipo: ${r.tipo}<br>
                        <span class="badge">${r.disponible ? "Disponible" : "No disponible"}</span>
                      </div>
                    `;

                    if (r.disponible) {
                      select.innerHTML += `<option value="${r.id}">${r.nombre}</option>`;
                    }
                  });
                } catch (e) {
                  contenedor.innerHTML = "No se pudieron cargar los recursos.";
                }
              }

              async function cargarReservas() {
                const contenedor = document.getElementById("reservas");

                try {
                  const res = await fetch("/api/reservas");
                  const data = await res.json();

                  if (data.length === 0) {
                    contenedor.innerHTML = "Todavía no hay reservas registradas.";
                    return;
                  }

                  contenedor.innerHTML = "";

                  data.forEach(r => {
                    contenedor.innerHTML += `
                      <div class="item">
                        <strong>${r.recurso}</strong><br>
                        Usuario: ${r.usuario}<br>
                        Correo: ${r.email}<br>
                        Fecha: ${r.fecha_reserva}<br>
                        Estado: <span class="badge">${r.estado}</span>
                      </div>
                    `;
                  });
                } catch (e) {
                  contenedor.innerHTML = "No se pudieron cargar las reservas.";
                }
              }

              async function crearReserva() {
                const mensaje = document.getElementById("mensaje");

                const data = {
                  nombre: document.getElementById("nombre").value,
                  email: document.getElementById("email").value,
                  recurso_id: parseInt(document.getElementById("recurso_id").value),
                  fecha_reserva: document.getElementById("fecha").value.replace("T", " ")
                };

                try {
                  const res = await fetch("/api/reservas", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(data)
                  });

                  const result = await res.json();

                  mensaje.style.display = "block";
                  mensaje.className = "msg ok";
                  mensaje.innerText = "Reserva creada correctamente. ID: " + result.reserva_id;

                  cargarReservas();
                } catch (e) {
                  mensaje.style.display = "block";
                  mensaje.className = "msg error";
                  mensaje.innerText = "Error al crear la reserva.";
                }
              }

              cargarRecursos();
              cargarReservas();
            </script>
          </body>
          </html>
              """

    - name: Crear servicio systemd para app-api
      copy:
        dest: /etc/systemd/system/app-api.service
        content: |
          [Unit]
          Description=Microservicio app-api - Interfaz web de reservas
          After=network.target

          [Service]
          WorkingDirectory={{ app_dir }}
          ExecStart={{ app_dir }}/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000
          Restart=always
          Environment=CORE_URL={{ core_url }}

          [Install]
          WantedBy=multi-user.target

    - name: Recargar systemd
      systemd:
        daemon_reload: yes

    - name: Habilitar e iniciar app-api
      systemd:
        name: app-api
        state: restarted
        enabled: yes
