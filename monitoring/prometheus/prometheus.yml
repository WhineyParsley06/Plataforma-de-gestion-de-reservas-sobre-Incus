global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "app-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["10.20.0.10:8000"]

  - job_name: "app-core"
    metrics_path: /metrics
    static_configs:
      - targets: ["10.20.0.11:8001"]
